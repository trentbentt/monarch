<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="coreM" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="1"/>
      <stop offset="55%" stop-color="#00D4FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- full-bleed bg (no rounding) so the OS mask never reveals transparency -->
  <rect width="512" height="512" fill="#04040F"/>
  <!-- mark kept inside the maskable safe zone (center ~80%) -->
  <circle cx="256" cy="256" r="118" fill="none" stroke="#00D4FF" stroke-width="3" opacity="0.22"/>
  <circle cx="256" cy="256" r="88"  fill="none" stroke="#00D4FF" stroke-width="3.5" opacity="0.36"/>
  <circle cx="256" cy="256" r="58"  fill="none" stroke="#00D4FF" stroke-width="4" opacity="0.55"/>
  <g stroke="#00D4FF" stroke-width="5" stroke-linecap="round" opacity="0.4">
    <line x1="256" y1="96"  x2="256" y2="144"/>
    <line x1="256" y1="368" x2="256" y2="416"/>
    <line x1="96"  y1="256" x2="144" y2="256"/>
    <line x1="368" y1="256" x2="416" y2="256"/>
  </g>
  <circle cx="256" cy="256" r="96" fill="url(#coreM)"/>
  <circle cx="256" cy="256" r="27" fill="#00D4FF"/>
</svg>
