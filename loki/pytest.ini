[pytest]
# Keep pytest out of cloned external training repos and large training scratch
# that live (gitignored) under loki/voice/training/ during wake-model training.
# These dirs ship their own test suites with deps we don't install; collecting
# them breaks the repo's own test run. (Defaults preserved + our additions.)
norecursedirs = .* build dist *.egg venv node_modules
    openWakeWord-src piper-sample-generator piper-sample-generator-dscripka
    datasets runs data
